    <section class="story-list-section" lang="ja-jp">
      <div class="story-list-name">
        <h1>List of Stories</h1>
      </div>
      <div class="story-list-container">
        <div class="story-list-card">
          <a class="story-list-left" href="story.html"></a>
          <div class="story-list-right">
            <div class="story-data-list">
              <p>
                <span
                  ><svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="black"
                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                    stroke="currentColor"
                    class="w-6 h-6"
                  >
                    <path
                      stroke-linecap="round"

            <div class="story-title-list" data-aos="fade-up">
              <a href="story.html"><h1 id="title">Placeholder</h1></a>
            </div>
            <div class="story-preview" data-aos="zoom-in">
              <a href="story.html"><p id="story">Placeholder</p></a>
            </div>
            <div class="story-genre">
              <ul>
                <li>Sci-fi</li>
                <li>Thriller</li>
              </ul>
            </div>
          </div>
        </div>

                    xmlns="http://www.w3.org/2000/svg"

                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                    stroke="currentColor"
                    class="w-6 h-6"
                  >

                      stroke-linecap="round"

                <li>Mysterious</li>
                <li>Upcoming</li>
