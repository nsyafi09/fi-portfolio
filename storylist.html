<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=EB+Garamond&family=Noto+Serif+JP:wght@300;400;700&family=Playfair+Display:ital@0;1&family=Roboto:ital,wght@0,100;0,300;1,300&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />

    <script defer src="js/nav.js"></script>
    <script defer src="js/storylist.js"></script>
    <title>Stories — Someday Under the Blue Sky</title>
    <!-- Style -->
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/story.css" />
    <link rel="stylesheet" href="css/storylist.css" />

  </head>
  <body>
    <header class="header-container" id="nav-root"></header>

    <section class="story-list-section" lang="ja-jp">
      <div class="story-list-name">
        <h1>List of Stories</h1>
      </div>
      <div class="story-list-container">
        <div id="story-list-mount"></div>

        <!-- PLACEHOLDER CARD — always shown at the end -->
        <div class="story-list-card">
          <div class="story-list-card-img" style="background-image: url(/images/sea-walk.jpg)"></div>
          <div class="story-list-right">
            <div class="story-data-list">
              <p>
                <span
                  ><svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="black"
                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                    stroke="currentColor"
                    class="w-6 h-6"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25"
                    />
                  </svg> </span
                >Tales-to-be-told Series
              </p>
            </div>
            <div class="story-title-list">
              <h1>Placeholder</h1>
            </div>
            <div class="story-preview">
              <p>A new story is on the way.</p>
            </div>
            <div class="story-genre">
              <ul>
                <li>Upcoming</li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </section>

    <footer>
      <p>Live a Life!</p>
    </footer>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
      AOS.init();
    </script>
  </body>
</html>
